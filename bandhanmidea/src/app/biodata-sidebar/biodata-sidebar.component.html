<!-- Toggle Button (Mobile only) -->
<button class="sidebar-toggle" (click)="toggleSidebar()">
  ☰
</button>

<!-- Sidebar -->
<div class="sidebar" [class.open]="isSidebarOpen">
  <div class="profile-box">
    <img src="assets/avatar.svg" class="avatar">
    <h4>বায়োডাটার অবস্থা</h4>
    <button class="complete-btn">সম্পূর্ণ করুন</button>
  </div>

  <ul class="menu">
    <li class="menu-item active">বায়োডাটা এডিট করুন</li>
    <li class="menu-item">পছন্দের তালিকা</li>
    <li class="menu-item">আমার একাউন্ট</li>
    <li class="menu-item">সেটিংস</li>
    <li class="menu-item">লগআউট</li>
  </ul>
</div>

<!-- Overlay -->
<div class="sidebar-overlay"
     *ngIf="isSidebarOpen"
     (click)="toggleSidebar()">
</div>
